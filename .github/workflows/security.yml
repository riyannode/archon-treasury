name: Security Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan on Monday at 08:00 UTC
    - cron: "0 8 * * 1"

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Secret scanning (gitleaks) ──────────────────────────────────────────────
  secrets:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Dependency vulnerability audit ───────────────────────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "9.15.9"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Audit for known vulnerabilities
        run: pnpm audit --audit-level=moderate
        # NOTE: npm's audit API is being retired (410). If this fails with
        # ERR_PNPM_AUDIT_BAD_RESPONSE, the audit endpoint is down — not
        # a real vulnerability. Upgrade pnpm or switch to npm audit when
        # the endpoint stabilizes. Track: https://github.com/pnpm/pnpm/issues
        continue-on-error: true

  # ── CodeQL analysis for TypeScript ───────────────────────────────────────────
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # Use security-extended for broader coverage without heaviness
          queries: security-extended
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
