name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.15.9"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: archon_treasury_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:testpassword@localhost:5432/archon_treasury_test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:unit

  db-integration:
    name: Database Integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: archon_treasury_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:testpassword@localhost:5432/archon_treasury_test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify PostgreSQL is healthy
        run: |
          for i in $(seq 1 10); do
            pg_isready -h localhost -p 5432 -U postgres && break || sleep 2
          done
      - name: Run baseline migration on empty database
        run: |
          # Service container starts with archon_treasury_test DB (empty)
          # Run committed baseline migration
          pnpm --filter @archon-treasury/database db:migrate
      - name: Verify migration metadata recorded
        run: |
          # Verify __drizzle_migrations table exists with exactly 1 row
          COUNT=$(PGPASSWORD=testpassword psql -h localhost -U postgres -d archon_treasury_test -t -A -c \
            "SELECT COUNT(*) FROM __drizzle_migrations;")
          echo "Migration records after first run: $COUNT"
          [ "$COUNT" = "1" ] || { echo "FAIL: expected 1 migration record, got $COUNT"; exit 1; }
          echo "✓ Migration metadata recorded (1 record)"
      - name: Verify migration rerun is idempotent
        run: |
          # Running migration again should be a no-op
          pnpm --filter @archon-treasury/database db:migrate
          # Verify count is still 1
          COUNT=$(PGPASSWORD=testpassword psql -h localhost -U postgres -d archon_treasury_test -t -A -c \
            "SELECT COUNT(*) FROM __drizzle_migrations;")
          echo "Migration records after rerun: $COUNT"
          [ "$COUNT" = "1" ] || { echo "FAIL: expected 1 migration record after rerun, got $COUNT"; exit 1; }
          echo "✓ Migration rerun is idempotent (still 1 record)"
      - name: Run database integration tests
        run: pnpm --filter @archon-treasury/database test:integration

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build \
            -f infra/containers/Dockerfile.api \
            -t archon-treasury-api:ci \
            .
      - name: Verify dist structure
        run: |
          docker run --rm archon-treasury-api:ci sh -c '
            echo "--- apps/api/dist/ ---"
            ls apps/api/dist/
            echo "--- index.js exists? ---"
            test -f apps/api/dist/index.js && echo "YES" || echo "MISSING"
            echo "--- packages/config/dist/ ---"
            ls packages/config/dist/
            echo "--- packages/domain/dist/ ---"
            ls packages/domain/dist/
            echo "--- packages/observability/dist/ ---"
            ls packages/observability/dist/
          '
      - name: Report image size
        run: |
          SIZE=$(docker image inspect archon-treasury-api:ci --format '{{.Size}}' | awk '{printf "%.1f MB", $1/1024/1024}')
          echo "Docker image size: $SIZE"

  docker-test:
    name: Container Health Test
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build \
            -f infra/containers/Dockerfile.api \
            -t archon-treasury-api:ci \
            .
      - name: Start container
        run: |
          docker run -d \
            --name archon-treasury-api-test \
            -p 3099:3000 \
            archon-treasury-api:ci
      - name: Wait for API readiness
        run: |
          echo "Waiting for API to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3099/ > /dev/null 2>&1; then
              echo "API ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "API failed to start within 30s"
          docker logs archon-treasury-api-test
          exit 1
      - name: Validate health endpoint
        run: |
          RESPONSE=$(curl -sf http://localhost:3099/)
          echo "Response: $RESPONSE"

          # HTTP 200
          STATUS=$(curl -sf -o /dev/null -w '%{http_code}' http://localhost:3099/)
          [ "$STATUS" = "200" ] || { echo "FAIL: HTTP $STATUS, expected 200"; exit 1; }
          echo "✓ HTTP 200"

          # JSON status ok
          echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='ok'" || { echo "FAIL: status != ok"; exit 1; }
          echo "✓ status ok"

          # service archon-treasury-api
          echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['service']=='archon-treasury-api'" || { echo "FAIL: service != archon-treasury-api"; exit 1; }
          echo "✓ service archon-treasury-api"

          echo "All health checks passed"
      - name: Cleanup container
        if: always()
        run: |
          docker stop archon-treasury-api-test 2>/dev/null || true
          docker rm archon-treasury-api-test 2>/dev/null || true
