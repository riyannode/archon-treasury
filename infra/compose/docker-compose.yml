# =============================================================================
# Archon Treasury — Docker Compose (Local Development)
# =============================================================================
version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: archon-treasury-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: archon_treasury
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d archon_treasury"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infra/containers/Dockerfile.api
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/archon_treasury
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  execution-worker:
    build:
      context: .
      dockerfile: infra/containers/Dockerfile.execution-worker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/archon_treasury
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
